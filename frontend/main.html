<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI-EAM 智能设备管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Microsoft YaHei','PingFang SC',sans-serif}
body{background:#f0f2f5;overflow:hidden}
.login-container{display:flex;height:100vh;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)}
.login-card{background:#fff;padding:40px;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);width:400px;max-width:90vw}
.login-card h2{text-align:center;margin-bottom:8px;color:#1a1a2e;font-size:24px}
.login-card .sub{text-align:center;color:#999;margin-bottom:24px;font-size:13px}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:4px;color:#333;font-size:13px;font-weight:500}
.form-group input,.form-group select{width:100%;padding:10px 12px;border:1px solid #d9d9d9;border-radius:8px;font-size:14px;transition:.2s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#1890ff;box-shadow:0 0 0 2px rgba(24,144,255,.2)}
.btn{width:100%;padding:10px;background:#1890ff;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;transition:.2s}
.btn.inline,.flex-row .btn,.card>.flex-row .btn,.card div[style*="flex"]>.btn{width:auto;min-width:96px;flex:0 0 auto}
.btn.block{width:100%}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn:hover:not(:disabled){background:#096dd9}
.btn.danger{background:#ff4d4f}
.btn.danger:hover{background:#cf1322}
.btn.success{background:#52c41a}
.btn.success:hover{background:#389e0d}
.btn.warning{background:#faad14;color:#333}
.btn.warning:hover{background:#d48806;color:#fff}
.btn.sm{padding:6px 12px;width:auto;font-size:13px}
.link{text-align:center;margin-top:16px;font-size:13px;color:#666}
.link a{color:#1890ff;cursor:pointer;text-decoration:none}
.link a:hover{text-decoration:underline}
.main-container{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:#001529;color:#fff;overflow-y:auto;flex-shrink:0}
.sidebar .logo{padding:20px 16px;font-size:18px;font-weight:700;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:8px}
.sidebar .logo .badge{font-size:10px;background:#1890ff;padding:2px 6px;border-radius:4px;font-weight:400}
.sidebar .user-info{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.1);font-size:13px;display:flex;align-items:center;gap:8px}
.sidebar .user-info .role-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.15)}
.sidebar .user-info .logout-btn{margin-left:auto;font-size:12px;cursor:pointer;opacity:.6;padding:2px 8px;border-radius:4px}
.sidebar .user-info .logout-btn:hover{opacity:1;background:rgba(255,255,255,.1)}
.nav-group{padding:8px 0}
.nav-group-title{font-size:11px;color:rgba(255,255,255,.45);padding:8px 16px 4px;text-transform:uppercase;letter-spacing:1px}
.nav-item{display:flex;align-items:center;gap:8px;padding:10px 16px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.65);transition:.15s;border-left:3px solid transparent}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav-item.active{color:#fff;background:rgba(24,144,255,.15);border-left-color:#1890ff}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center}
.content{flex:1;overflow-y:auto;padding:24px;background:#f0f2f5;scroll-behavior:smooth}
.content h2{margin-bottom:4px;font-size:20px;color:#1a1a2e}
.content .desc{color:#888;font-size:13px;margin-bottom:20px}
.page-header{margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #e8e8e8}
.info-banner{padding:8px 12px;background:#e6f7ff;border:1px solid #91d5ff;border-radius:8px;font-size:13px;margin-bottom:12px;display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.info-banner.warn{background:#fffbe6;border-color:#ffe58f}
.steps-hint{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.step-tag{padding:4px 12px;background:#f5f5f5;border-radius:16px;font-size:12px;color:#666}
.step-tag.active{background:#e6f7ff;color:#1890ff;font-weight:600}
.toast-wrap{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:360px}
.toast{padding:12px 16px;border-radius:8px;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:toastIn .25s ease}
.toast.info{background:#e6f7ff;border:1px solid #91d5ff;color:#0050b3}
.toast.success{background:#f6ffed;border:1px solid #b7eb8f;color:#389e0d}
.toast.error{background:#fff2f0;border:1px solid #ffccc7;color:#cf1322}
.toast.warn{background:#fffbe6;border:1px solid #ffe58f;color:#d48806}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:24px;color:#1890ff;font-size:14px}
.loading::before{content:'';width:18px;height:18px;border:2px solid #91d5ff;border-top-color:#1890ff;border-radius:50%;animation:spin .7s linear infinite}
.form-error{color:#ff4d4f;font-size:13px;margin-top:8px;display:none}
.sidebar-toggle{display:none;position:fixed;top:12px;left:12px;z-index:100;width:40px;height:40px;border:none;border-radius:8px;background:#001529;color:#fff;font-size:20px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.sidebar-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:98}
@media(max-width:768px){
  .sidebar-toggle{display:block}
  .main-container{flex-direction:column}
  .sidebar{position:fixed;left:0;top:0;height:100vh;width:260px;z-index:99;transform:translateX(-100%);transition:transform .25s}
  .sidebar.open{transform:translateX(0)}
  .sidebar-mask.show{display:block}
  .content{padding:16px;padding-top:56px}
  .row>*{min-width:100%}
  .toast-wrap{left:16px;right:16px;max-width:none}
}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-title{font-size:15px;font-weight:600;margin-bottom:12px;color:#333}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>*{flex:1;min-width:200px}
textarea{width:100%;padding:10px 12px;border:1px solid #d9d9d9;border-radius:8px;font-size:14px;resize:vertical;min-height:80px;transition:.2s}
textarea:focus{outline:none;border-color:#1890ff;box-shadow:0 0 0 2px rgba(24,144,255,.2)}
.result-box{background:#f6f8fa;border:1px solid #e8e8e8;border-radius:8px;padding:16px;margin-top:12px;max-height:500px;overflow:auto;font-size:13px;white-space:pre-wrap;word-break:break-all}
.result-box table{width:100%;border-collapse:collapse;font-size:13px}
.result-box table th,.result-box table td{padding:8px 10px;border:1px solid #e8e8e8;text-align:left}
.result-box table th{background:#fafafa;font-weight:600}
.result-box table tr:nth-child(even){background:#fafafa}
.table-wrapper{overflow-x:auto}
table.data-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
table.data-table th,table.data-table td{padding:10px 12px;border:1px solid #e8e8e8;text-align:left}
table.data-table th{background:#fafafa;font-weight:600;white-space:nowrap}
table.data-table tr:hover{background:#f0f7ff}
table.data-table tr:nth-child(even){background:#fafafa}
.status-badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:12px}
.status-badge.green{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.status-badge.blue{background:#e6f7ff;color:#1890ff;border:1px solid #91d5ff}
.status-badge.orange{background:#fff7e6;color:#fa8c16;border:1px solid #ffd591}
.status-badge.red{background:#fff2f0;color:#ff4d4f;border:1px solid #ffccc7}
.file-upload-zone{border:2px dashed #d9d9d9;border-radius:8px;padding:32px;text-align:center;cursor:pointer;transition:.2s;background:#fafafa;margin-bottom:12px}
.file-upload-zone:hover{border-color:#1890ff;background:#f0f7ff}
.file-upload-zone.dragover{border-color:#1890ff;background:#e6f7ff}
.file-upload-zone .icon{font-size:36px;color:#999}
.file-upload-zone .text{color:#666;margin-top:8px;font-size:14px}
.file-upload-zone .hint{color:#999;font-size:12px;margin-top:4px}
.file-info{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f6ffed;border:1px solid #b7eb8f;border-radius:6px;margin-bottom:12px;font-size:13px}
.pcf-file-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 12px;background:#f6ffed;border:1px solid #b7eb8f;border-radius:6px;margin-bottom:6px;font-size:13px}
.pcf-file-item.uploaded{background:#e6f7ff;border-color:#91d5ff}
.pcf-file-item .name{flex:1;word-break:break-all}
.pcf-file-item .meta{color:#999;font-size:12px;white-space:nowrap}
.pcf-file-item .remove{color:#ff4d4f;cursor:pointer;font-size:18px;line-height:1;padding:0 6px;border:none;background:none;flex-shrink:0}
.pcf-file-item .remove:hover{color:#cf1322}
.pcf-file-empty{text-align:center;padding:16px;color:#999;font-size:13px;background:#fafafa;border:1px dashed #d9d9d9;border-radius:8px}
.checkbox-label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;padding:4px 0}
.checkbox-label input[type=checkbox]{width:16px;height:16px;cursor:pointer}
.engineer-card{border:1px solid #e8e8e8;border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;transition:.2s;display:flex;justify-content:space-between;align-items:center}
.engineer-card:hover{border-color:#1890ff;background:#f0f7ff}
.engineer-card.selected{border-color:#1890ff;background:#e6f7ff;box-shadow:0 0 0 2px rgba(24,144,255,.2)}
.empty-state{text-align:center;padding:32px;color:#999;font-size:14px}
.flex-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.text-result{background:#fff;padding:16px;border-radius:8px;line-height:1.8;font-size:14px;color:#333;white-space:pre-wrap}
.text-result h4{color:#1890ff;margin-top:12px;margin-bottom:6px}
.tab-bar{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid #e8e8e8}
.tab-item{padding:8px 20px;cursor:pointer;font-size:13px;color:#666;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s}
.tab-item:hover{color:#1890ff}
.tab-item.active{color:#1890ff;border-bottom-color:#1890ff;font-weight:600}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;margin:2px}
.tag.blue{background:#e6f7ff;color:#1890ff;border:1px solid #91d5ff}
.tag.green{background:#f6ffed;color:#52c41a;border:1px solid #b7ebf8}
.tag.orange{background:#fff7e6;color:#fa8c16;border:1px solid #ffd591}
.tag.purple{background:#f9f0ff;color:#722ed1;border:1px solid #d3adf7}
</style>
</head>
<body>
<div id="app"><div class="loading" style="padding-top:40vh">加载中...</div></div>
<script>
// ========== 工具函数 ==========
const API_BASE = window.location.origin.startsWith('http') ? window.location.origin : 'http://127.0.0.1:8000';
function getToken(){return localStorage.getItem('token')||''}
function getUser(){try{return JSON.parse(localStorage.getItem('user')||'{}')}catch{return{}}}
function saveUser(u){localStorage.setItem('user',JSON.stringify(u))}

function escapeHtml(s){
  if(s==null)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg,type){
  type=type||'info';
  let wrap=document.getElementById('toastWrap');
  if(!wrap){wrap=document.createElement('div');wrap.id='toastWrap';wrap.className='toast-wrap';document.body.appendChild(wrap)}
  const el=document.createElement('div');
  el.className='toast '+type;
  el.textContent=msg;
  wrap.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300)},3200);
}
function syncPartName(from,to){
  const a=document.getElementById(from),b=document.getElementById(to);
  if(a&&b&&a.value!==b.value)b.value=a.value;
}
window.toggleSidebar=function(open){
  const sb=document.querySelector('.sidebar');
  const mask=document.getElementById('sidebarMask');
  if(!sb)return;
  const on=open==null?!sb.classList.contains('open'):open;
  sb.classList.toggle('open',on);
  if(mask)mask.classList.toggle('show',on);
};

async function apiGet(url){
  const res=await fetch(API_BASE+url,{headers:{'Authorization':'Bearer '+getToken()}});
  return res.json();
}
async function apiPost(url,data,isFormData=false){
  const h={'Authorization':'Bearer '+getToken()};
  if(!isFormData)h['Content-Type']='application/json';
  const res=await fetch(API_BASE+url,{method:'POST',headers:h,body:isFormData?data:JSON.stringify(data)});
  return res.json();
}
async function uploadFile(url,formData){
  const res=await fetch(API_BASE+url,{method:'POST',headers:{'Authorization':'Bearer '+getToken()},body:formData});
  return res.json();
}
function showResult(container,data,asText=false){
  if(!container)return;
  if(asText&&typeof data==='string'){container.innerHTML='<div class="text-result">'+data.replace(/\n/g,'<br>')+'</div>';return}
  if(asText&&data&&data.content){container.innerHTML='<div class="text-result">'+data.content.replace(/\n/g,'<br>')+'</div>';return}
  try{
    const json=typeof data==='string'?JSON.parse(data):data;
    if(asText&&typeof json==='object'&&json!==null){
      const txt=json.reasoning||json.analysis||json.summary||json.content||json.result||json.recommendation||JSON.stringify(json,null,2);
      container.innerHTML='<div class="text-result">'+txt.replace(/\n/g,'<br>')+'</div>';return;
    }
    container.innerHTML='<pre style="font-size:13px;margin:0">'+JSON.stringify(json,null,2)+'</pre>';
  }catch{container.innerHTML='<div style="font-size:13px">'+(data||'')+'</div>'}
}
function showTable(container,arr,columns){
  if(!arr||!arr.length){container.innerHTML='<div class="empty-state">暂无数据</div>';return}
  let html='<div class="table-wrapper"><table class="data-table"><thead><tr>';
  columns.forEach(c=>{html+='<th>'+(c.label||c)+'</th>'});
  html+='</tr></thead><tbody>';
  arr.forEach(row=>{
    html+='<tr>';
    columns.forEach(c=>{
      const key=c.key||c;let val=row[key];
      if(c.render)val=c.render(val,row);
      else if(val===null||val===undefined)val='-';
      html+='<td>'+escapeHtml(val)+'</td>';
    });
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  container.innerHTML=html;
}
function renderQuotationResult(container,data,autoAccum){
  if(!data||!data.length){container.innerHTML='<div class="empty-state">无数据</div>';return}
  const qItems=f=>f.报价明细||f.items||[];
  const qName=f=>f.文件名||f.filename||'-';
  let allItems=[];
  data.forEach(f=>{
    const items=qItems(f);
    if(items.length){
      items.forEach(item=>{
        allItems.push({...item, _source:qName(f)});
      });
    }
  });
  if(autoAccum && allItems.length){
    const existingSources=new Set(window.__quotationItems.map(i=>i._source));
    allItems.forEach(item=>{
      if(!existingSources.has(item._source)){
        window.__quotationItems.push(item);
        existingSources.add(item._source);
      }
    });
    if(window.updateAccumDisplay)window.updateAccumDisplay();
  }
  let html='';
  const successCount=data.filter(f=>qItems(f).length).length;
  const totalItems=allItems.length;
  const failCount=data.length-successCount;
  html+=`<div style="margin-bottom:12px;font-size:13px;color:#666">
    ${successCount}个文件识别成功，共提取 ${totalItems} 条报价`+(failCount?`, ${failCount}个文件解析失败`:'')+`</div>`;
  if(totalItems){
    html+='<div class="table-wrapper"><table class="data-table"><thead><tr>';
    if(data.length>1)html+='<th>来源文件</th>';
    html+=`<th>备件名称</th><th>规格型号</th><th>单价</th><th>数量</th><th>总价</th><th>币种</th><th>交期(天)</th><th>付款条件</th><th>有效期</th><th>含税</th></tr></thead><tbody>`;
    allItems.forEach(item=>{
      const g=(k,alt)=>item[k]??item[alt]??'-';
      html+='<tr>';
      if(data.length>1)html+=`<td style="max-width:150px;word-break:break-all">${item._source}</td>`;
      html+=`<td>${g('备件名称','spare_part_name')}</td>`;
      html+=`<td>${g('规格型号','specification')}</td>`;
      html+=`<td>${g('单价','unit_price')}</td>`;
      html+=`<td>${g('数量','quantity')}</td>`;
      html+=`<td>${g('总价','total_price')}</td>`;
      html+=`<td>${g('币种','currency')}</td>`;
      html+=`<td>${g('交期天数','delivery_days')}</td>`;
      html+=`<td>${g('付款条件','payment_terms')}</td>`;
      html+=`<td>${g('有效期','valid_until')}</td>`;
      html+=`<td>${item['含税']??(item.tax_included!=null?(item.tax_included?'是':'否'):'-')}</td>`;
      html+='</tr>';
    });
    html+='</tbody></table></div>';
    html+=`<div style="margin-top:8px;font-size:13px;color:#666">识别完成后可点击「比价分析」查看结果</div>`;
  }
  data.filter(f=>!qItems(f).length).forEach(f=>{
    const raw=f.原始文本||f.raw_text;
    html+=`<div style="margin-top:8px;padding:8px 12px;background:#fff2f0;border:1px solid #ffccc7;border-radius:6px;font-size:13px">
      <span style="color:#ff4d4f">⚠️ ${qName(f)}</span>：${f.备注||f.note||'解析失败'}
      ${raw?`<details style="margin-top:4px"><summary style="cursor:pointer;color:#1890ff;font-size:12px">查看原始识别文本</summary><pre style="font-size:12px;margin:4px 0;white-space:pre-wrap;background:#fff;padding:8px;border-radius:4px">${raw}</pre></details>`:''}
    </div>`;
  });
  container.innerHTML=html;
}
function normalizeQuoteItem(item,part){
  const g=(cn,en,f)=>item[cn]??item[en]??f;
  const tax=item['含税']!=null?(item['含税']==='是'):item.tax_included;
  return {
    供应商: g('供应商','supplier','未知供应商'),
    备件名称: g('备件名称','spare_part_name',part||''),
    规格型号: g('规格型号','specification',''),
    单价: g('单价','unit_price',null),
    数量: g('数量','quantity',null),
    总价: g('总价','total_price',null),
    币种: g('币种','currency','CNY'),
    交期天数: g('交期天数','delivery_days',null),
    付款条件: g('付款条件','payment_terms',''),
    有效期: g('有效期','valid_until',''),
    含税: tax===true?'是':tax===false?'否':tax
  };
}
function renderCompareResult(container,resp){
  if(!container)return;
  if(resp.code!==200){showResult(container,resp);return}
  const d=resp.data||{};
  let html='';
  if(d.推荐理由||d.reason){
    html+=`<div class="card"><div class="card-title">分析结论</div>
      <p><strong>备件名称：</strong>${d.备件名称||'-'}</p>
      <p><strong>推荐供应商ID：</strong>${d.推荐供应商ID??d.recommended_supplier_id??'-'}</p>
      <p><strong>推荐理由：</strong>${d.推荐理由||d.reason||'-'}</p></div>`;
  }
  const table=d.汇总表||d.summary_table||[];
  if(table.length){
    html+='<div class="card"><div class="card-title">供应商比价汇总</div><div class="table-wrapper"><table class="data-table"><thead><tr>';
    html+='<th>供应商ID</th><th>供应商名称</th><th>单价</th><th>交期(天)</th><th>付款条件</th><th>综合得分</th></tr></thead><tbody>';
    table.forEach(row=>{
      html+=`<tr>
        <td>${row.供应商ID??row.supplier_id??'-'}</td>
        <td>${row.供应商名称??row.supplier_name??'-'}</td>
        <td>${row.单价??row.unit_price??'-'}</td>
        <td>${row.交期天数??row.delivery_days??'-'}</td>
        <td>${row.付款条件??row.payment_terms??'-'}</td>
        <td>${row.综合得分??row.total_score??'-'}</td>
      </tr>`;
    });
    html+='</tbody></table></div></div>';
  }
  const tips=d.谈判建议||d.negotiation_suggestions||[];
  if(tips.length){
    html+='<div class="card"><div class="card-title">谈判建议</div><ul style="margin:0;padding-left:20px">';
    tips.forEach(t=>{html+=`<li style="margin-bottom:4px">${t}</li>`});
    html+='</ul></div>';
  }
  if(!html)html='<div class="empty-state">无比价结果</div>';
  container.innerHTML=html;
}

// ========== 角色配置 ==========

// ========== 渲染文件上传（通用） ==========
function renderFileUpload(container,endpoint,extraFields,options){
  options=options||{};
  const id='fu_'+Math.random().toString(36).substr(2,6);
  const isMulti=!!options.multiple;
  let extraHtml='';
  if(extraFields)extraFields.forEach(f=>{
    if(f.type==='checkbox')extraHtml+=`<label class="checkbox-label"><input type="checkbox" id="${id}_${f.key}" ${f.checked?'checked':''}> ${f.label}</label>`;
    else extraHtml+=`<div class="form-group"><label>${f.label}</label><input type="${f.type||'text'}" id="${id}_${f.key}" placeholder="${f.placeholder||''}"></div>`;
  });
  container.innerHTML=`
    <div class="card"><div class="card-title">${options.title||'上传文件'}</div>
    <div class="file-upload-zone" id="${id}_zone"><div class="icon">📁</div><div class="text">点击选择文件或拖拽文件到此处</div><div class="hint">${options.acceptText||'支持所有常见文件格式'}${isMulti?'（可多选）':''}</div></div>
    <input type="file" id="${id}_file" style="display:none" accept="${options.accept||'*'}" ${isMulti?'multiple':''}>
    <div id="${id}_info" style="display:none" class="file-info">📎 <span id="${id}_name"></span></div>
    ${extraHtml}
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn" id="${id}_btn">上传</button>
      <button class="btn danger" id="${id}_cancel_btn" style="display:none">取消上传</button>
    </div>
    <div id="${id}_result" class="result-box" style="display:none"></div></div>`;
  const zone=document.getElementById(id+'_zone');
  const fileInput=document.getElementById(id+'_file');
  let abortController=null;
  zone.onclick=()=>fileInput.click();
  zone.ondragover=e=>{e.preventDefault();zone.classList.add('dragover')};
  zone.ondragleave=()=>zone.classList.remove('dragover');
  zone.ondrop=e=>{e.preventDefault();zone.classList.remove('dragover');if(e.dataTransfer.files.length)fileInput.files=e.dataTransfer.files;updateFileInfo()};
  fileInput.onchange=updateFileInfo;
  function updateFileInfo(){
    const files=fileInput.files;
    if(!files||!files.length){document.getElementById(id+'_info').style.display='none';return}
    const names=[];
    let totalSize=0;
    let hasLarge=false;
    for(let i=0;i<Math.min(files.length,5);i++){
      names.push(files[i].name);
      totalSize+=files[i].size;
      if(files[i].size>2048*1024)hasLarge=true;
    }
    const label=files.length===1?names[0]+' ('+(files[0].size/1024).toFixed(1)+'KB)':files.length+'个文件 ('+(totalSize/1024/1024).toFixed(1)+'MB)';
    const warning=hasLarge?' <span style="color:#e74c3c;font-size:11px">⚠️ 含大文件，上传可能较慢</span>':'';
    document.getElementById(id+'_name').textContent=label+warning;
    document.getElementById(id+'_info').style.display='flex';
  }
  document.getElementById(id+'_btn').onclick=async()=>{
    const files=fileInput.files;
    if(!files||!files.length){alert('请先选择文件');return}
    const fd=new FormData();
    for(let i=0;i<files.length;i++)fd.append('files',files[i]);
    if(extraFields)extraFields.forEach(fld=>{
      const el=document.getElementById(id+'_'+fld.key);
      if(el)fd.append(fld.key,fld.type==='checkbox'?(el.checked?'true':'false'):el.value);
    });
    const btn=document.getElementById(id+'_btn');
    const cancelBtn=document.getElementById(id+'_cancel_btn');
    btn.disabled=true;btn.textContent='上传中 ('+files.length+'个文件)...';
    cancelBtn.style.display='inline-block';
    abortController=new AbortController();
    try{
      const res=await fetch(API_BASE+endpoint,{
        method:'POST',
        headers:{'Authorization':'Bearer '+getToken()},
        body:fd,
        signal:abortController.signal,
      });
      const json=await res.json();
      const resultEl=document.getElementById(id+'_result');
      resultEl.style.display='block';
      if(options.onResult){
        options.onResult(resultEl,json);
      }else{
        showResult(resultEl,json);
      }
    }catch(e){
      if(e.name==='AbortError'){
        const resultEl=document.getElementById(id+'_result');
        resultEl.style.display='block';
        resultEl.innerHTML='<div class="empty-state">已取消上传</div>';
      }else{
        alert('上传失败：'+e.message);
      }
    }
    finally{
      btn.disabled=false;btn.textContent='上传';
      cancelBtn.style.display='none';
      abortController=null;
    }
  };
  document.getElementById(id+'_cancel_btn').onclick=()=>{
    if(abortController){
      abortController.abort();
    }
  };
  return id;
}

// ========== 在线语音录制 ==========
window.toggleVoiceRecord=async function(){
  const btn=document.getElementById('voice_record_btn');
  const status=document.getElementById('voice_status');
  const timer=document.getElementById('voice_timer');
  const resultBox=document.getElementById('voice_result');
  if(window.mediaRecorder&&window.mediaRecorder.state==='recording'){
    // 停止录音
    window.mediaRecorder.stop();
    window.mediaRecorder.stream.getTracks().forEach(t=>t.stop());
    clearInterval(window.recordingTimer);
    btn.textContent='🎤 开始录音';
    btn.style.background='#1890ff';
    status.textContent='语音处理中...';
    timer.style.display='none';
    return;
  }
  // 开始录音
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    alert('您的浏览器不支持麦克风录制，请使用文件上传方式');return;
  }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    window.audioChunks=[];
    window.mediaRecorder=new MediaRecorder(stream,{mimeType:'audio/webm'});
    window.mediaRecorder.ondataavailable=e=>{if(e.data.size>0)window.audioChunks.push(e.data);};
    window.mediaRecorder.onstop=async()=>{
      const blob=new Blob(window.audioChunks,{type:'audio/webm'});
      const fd=new FormData();
      fd.append('file',blob,'recording.webm');
      resultBox.style.display='block';resultBox.innerHTML='<div class="loading">AI语音识别中...</div>';
      try{
        const r=await apiPost('/api/v1/engineer/work-order/speech-to-text',fd,true);
        showResult(resultBox,r,true);
        status.innerHTML='✅ 录制完成，识别结果如上';
      }catch(e){
        resultBox.innerHTML='<div class="empty-state">识别失败：'+e.message+'</div>';
        status.textContent='识别失败，请重试';
      }
    };
    window.mediaRecorder.start();
    btn.textContent='⏹ 停止录音';
    btn.style.background='#ff4d4f';
    status.textContent='正在录音...点击停止按钮结束';
    window.recordingSeconds=0;
    timer.style.display='block';
    timer.textContent='00:00';
    window.recordingTimer=setInterval(()=>{
      window.recordingSeconds++;
      const m=String(Math.floor(window.recordingSeconds/60)).padStart(2,'0');
      const s=String(window.recordingSeconds%60).padStart(2,'0');
      timer.textContent=m+':'+s;
    },1000);
    resultBox.style.display='none';
  }catch(e){
    alert('无法访问麦克风：'+e.message+'，请使用文件上传方式');
  }
};

window.toggleRWRecord=async function(){
  const btn=document.getElementById('rw_voice_btn');
  const status=document.getElementById('rw_voice_status');
  const timer=document.getElementById('rw_voice_timer');
  const resultBox=document.getElementById('rw_voice_result');
  if(window.rwMediaRecorder&&window.rwMediaRecorder.state==='recording'){
    window.rwMediaRecorder.stop();
    window.rwMediaRecorder.stream.getTracks().forEach(t=>t.stop());
    clearInterval(window.rwTimer);
    btn.textContent='🎤 开始录音';
    status.textContent='语音处理中...';
    timer.style.display='none';
    return;
  }
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){alert('浏览器不支持麦克风');return}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    window.rwAudioChunks=[];
    window.rwMediaRecorder=new MediaRecorder(stream,{mimeType:'audio/webm'});
    window.rwMediaRecorder.ondataavailable=e=>{if(e.data.size>0)window.rwAudioChunks.push(e.data)};
    window.rwMediaRecorder.onstop=async()=>{
      const blob=new Blob(window.rwAudioChunks,{type:'audio/webm'});
      const fd=new FormData();fd.append('file',blob,'recording.webm');
      resultBox.style.display='block';resultBox.innerHTML='<div class="loading">AI语音识别中...</div>';
      try{const r=await apiPost('/api/v1/engineer/work-order/speech-to-text',fd,true);if(r.code===200&&r.data){const t=r.data.文本||r.data.text||'';resultBox.innerHTML='<div class="text-result">'+t+'</div>';document.getElementById('rw_voice_text').value=t;}else showResult(resultBox,r,true)}catch(e){resultBox.innerHTML='<div class="empty-state">识别失败：'+e.message+'</div>'}
    };
    window.rwMediaRecorder.start();
    btn.textContent='⏹ 停止录音';
    status.textContent='录音中...';
    window.rwSeconds=0;timer.style.display='block';timer.textContent='00:00';
    window.rwTimer=setInterval(()=>{window.rwSeconds++;const m=String(Math.floor(window.rwSeconds/60)).padStart(2,'0');const s=String(window.rwSeconds%60).padStart(2,'0');timer.textContent=m+':'+s},1000);
  }catch(e){alert('无法访问麦克风');}
};

window.__quotationItems=[];
window.__pcfFileQueue=window.__pcfFileQueue||[];

window.pcfFileKey=function(file){return file.name+'|'+file.size+'|'+file.lastModified};

window.addPcfFiles=function(fileList){
  if(!fileList||!fileList.length)return;
  const keys=new Set(window.__pcfFileQueue.map(x=>x.key));
  for(let i=0;i<fileList.length;i++){
    const file=fileList[i];
    const key=window.pcfFileKey(file);
    if(keys.has(key))continue;
    keys.add(key);
    window.__pcfFileQueue.push({key,file,uploaded:false});
  }
  window.renderPcfFileList();
};

window.removePcfFile=function(idx){
  const entry=window.__pcfFileQueue[idx];
  if(!entry)return;
  window.__pcfFileQueue.splice(idx,1);
  if(entry.uploaded){
    window.__quotationItems=window.__quotationItems.filter(i=>i._source!==entry.file.name);
    window.updateAccumDisplay();
  }
  window.renderPcfFileList();
};

window.renderPcfFileList=function(){
  const el=document.getElementById('pcf_file_list');
  if(!el)return;
  if(!window.__pcfFileQueue.length){el.innerHTML='<div class="pcf-file-empty">暂无文件，点击上方区域或拖拽文件到此处</div>';return}
  let html='';
  window.__pcfFileQueue.forEach((entry,idx)=>{
    const f=entry.file;
    const size=f.size>1024*1024?(f.size/1024/1024).toFixed(1)+'MB':(f.size/1024).toFixed(1)+'KB';
    html+=`<div class="pcf-file-item${entry.uploaded?' uploaded':''}">
      <span class="name">📎 ${escapeHtml(f.name)}</span>
      <span class="meta">${size}${entry.uploaded?' · 已识别':''}</span>
      <button type="button" class="remove" title="删除" onclick="removePcfFile(${idx})">×</button>
    </div>`;
  });
  el.innerHTML=html;
};

window.setupPriceFileUpload=function(){
  const zone=document.getElementById('pcf_zone');
  const fi=document.getElementById('pcf_file');
  if(!zone||!fi||zone._bound)return;
  zone._bound=true;
  zone.onclick=()=>fi.click();
  zone.ondragover=e=>{e.preventDefault();zone.classList.add('dragover')};
  zone.ondragleave=()=>zone.classList.remove('dragover');
  zone.ondrop=e=>{
    e.preventDefault();zone.classList.remove('dragover');
    if(e.dataTransfer.files.length)window.addPcfFiles(e.dataTransfer.files);
  };
  fi.onchange=()=>{
    if(fi.files.length)window.addPcfFiles(fi.files);
    fi.value='';
  };
  window.renderPcfFileList();
};
window.doPriceFileUpload=async function(){
  const pending=window.__pcfFileQueue.filter(x=>!x.uploaded);
  if(!pending.length){alert(window.__pcfFileQueue.length?'所选文件均已识别，请添加新文件':'请先选择文件');return}
  const fd=new FormData();
  pending.forEach(x=>fd.append('files',x.file));
  const btn=document.getElementById('pcf_upload_btn');
  const cb=document.getElementById('pcf_cancel_btn');
  btn.disabled=true;btn.textContent='上传中 ('+pending.length+'个文件)...';
  cb.style.display='inline-block';
  window._pcfAbort=new AbortController();
  try{
    const res=await fetch(API_BASE+'/api/v1/purchaser/quotation/upload',{
      method:'POST',
      headers:{'Authorization':'Bearer '+getToken()},
      body:fd,
      signal:window._pcfAbort.signal,
    });
    const json=await res.json();
    const re=document.getElementById('pcf_upload_result');
    re.style.display='block';
    if(json.code===200&&json.data){
      pending.forEach(x=>{x.uploaded=true});
      window.renderPcfFileList();
      renderQuotationResult(re,json.data,true);
      if(window.loadPriceHistory)window.loadPriceHistory();
    }else{
      showResult(re,json);
    }
  }catch(e){
    if(e.name==='AbortError'){
      document.getElementById('pcf_upload_result').style.display='block';
      document.getElementById('pcf_upload_result').innerHTML='<div class="empty-state">已取消上传</div>';
    }else{alert('上传失败：'+e.message)}
  }finally{
    btn.disabled=false;btn.textContent='上传识别';
    cb.style.display='none';window._pcfAbort=null;
  }
};

      const name=f.文件名||f.filename||'-';
      const modified=f.修改时间||f.last_modified||'-';

window.startExam=async function(){
  const type=document.getElementById('exam_type').value;
  const btn=document.getElementById('exam_start');
  btn.disabled=true;btn.textContent='生成中...';
  const r=await apiPost('/api/v1/engineer/exam/start',{考核类型:type});
  btn.disabled=false;btn.textContent='重新开始考核';
  if(r.code!==200||!r.data){alert('生成失败');return}
  window.examQuestions=r.data.questions||r.data.scenario?.split('\n')||['问题1：请分析设备故障原因','问题2：请提出维修方案','问题3：请列出所需备件'];
  window.examAnswers={};
  document.getElementById('exam_area').style.display='block';
  renderExamQuestions();
};
function renderExamQuestions(){
  const el=document.getElementById('exam_questions');if(!el)return;
  let html='<div class="card-title">请回答以下问题（可随时修改答案，全部答完后点击提交评分）</div>';
  window.examQuestions.forEach((q,i)=>{
    const aid='exam_a_'+i;
    html+=`<div style="margin-bottom:16px;padding:12px;border:1px solid #e8e8e8;border-radius:8px">
      <div style="font-weight:600;margin-bottom:8px">第${i+1}题：${typeof q==='string'?q:(q.question||q)}</div>
      <textarea id="${aid}" placeholder="请输入你的答案..." style="min-height:60px" oninput="window.examAnswers[${i}]=this.value">${window.examAnswers[i]||''}</textarea>
    </div>`;
  });
  el.innerHTML=html;
  Object.keys(window.examAnswers).forEach(k=>{
    const ta=document.getElementById('exam_a_'+k);
    if(ta)ta.value=window.examAnswers[k];
  });
}
window.submitExam=async function(){
  window.examQuestions.forEach((_,i)=>{const ta=document.getElementById('exam_a_'+i);if(ta)window.examAnswers[i]=ta.value;});
  const allAnswers=Object.values(window.examAnswers).filter(Boolean);
  if(!allAnswers.length){alert('请至少回答一题再提交');return}
  const btn=document.getElementById('exam_submit');
  btn.disabled=true;btn.textContent='AI评分中...';
  const r=await apiPost('/api/v1/engineer/exam/submit',{考核类型:document.getElementById('exam_type').value,答案列表:Object.values(window.examAnswers)});
  btn.disabled=false;btn.textContent='重新提交评分';
  const el=document.getElementById('exam_result');
  el.style.display='block';
  if(r.code===200&&r.data){
    let html='<div class="card-title">考核结果</div>';
    const score=r.data.得分??r.data.score;
    if(score!==undefined)html+=`<div style="font-size:18px;font-weight:700;color:#1890ff;margin-bottom:12px">得分：${score}分</div>`;
    const detailRaw=r.data.详情||r.data.detail;
    if(detailRaw){
      const detail=typeof detailRaw==='string'?JSON.parse(detailRaw):detailRaw;
      if(Array.isArray(detail))detail.forEach((d,i)=>{
        html+=`<div style="margin-bottom:12px;padding:12px;border:1px solid #e8e8e8;border-radius:8px">
          <div style="font-weight:600;margin-bottom:4px">第${i+1}题</div>
          <div style="font-size:13px;color:#666;margin-bottom:2px"><b>你的答案：</b>${d.user_answer||window.examAnswers[i]||'未作答'}</div>
          <div style="font-size:13px;color:#52c41a"><b>参考答案：</b>${d.reference_answer||d.correct_answer||'无'}</div>
          ${d.score!==undefined?`<div style="font-size:13px;color:#fa8c16">得分：${d.score}</div>`:''}
        </div>`;
      });
      else html+=`<div style="font-size:13px;color:#666">${JSON.stringify(detail,null,2)}</div>`;
    }
    if(r.data.feedback)html+=`<div style="margin-top:8px;padding:12px;background:#f6ffed;border-radius:8px;font-size:13px">${r.data.feedback}</div>`;
    el.innerHTML=html;
  }else showResult(el,r,true);
};

// ========== 登录逻辑 ==========
function renderLogin(){
  document.getElementById('app').innerHTML=`
    <div class="login-container">
      <div class="login-card">
        <h2>AI-EAM 智能设备管理系统</h2>
        <div class="sub">AI-driven Equipment Asset Management</div>
        <div class="form-group"><label>用户名</label><input id="login_user" placeholder="请输入用户名" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <div class="form-group"><label>密码</label><input id="login_pass" type="password" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <div id="login_error" class="form-error"></div>
        <button class="btn block" onclick="doLogin()">登 录</button>
        <div class="link">还没有账号？<a onclick="showRegister()">立即注册</a></div>
      </div>
    </div>`;
}
function showRegister(){
  document.getElementById('app').innerHTML=`
    <div class="login-container">
      <div class="login-card">
        <h2>注册账号</h2>
        <div class="form-group"><label>用户名</label><input id="reg_user" placeholder="请输入用户名"></div>
        <div class="form-group"><label>密码</label><input id="reg_pass" type="password" placeholder="请输入密码"></div>
        <div class="form-group"><label>姓名</label><input id="reg_name" placeholder="请输入真实姓名"></div>
        <button class="btn" onclick="doRegister()">注 册</button>
        <div class="link">已有账号？<a onclick="renderLogin()">返回登录</a></div>
      </div>
    </div>`;
}
window.doLogin=async function(){
  const u=document.getElementById('login_user').value.trim();
  const p=document.getElementById('login_pass').value;
  const errEl=document.getElementById('login_error');
  if(errEl){errEl.style.display='none';errEl.textContent=''}
  if(!u||!p){if(errEl){errEl.textContent='请输入用户名和密码';errEl.style.display='block'}return}
  const btn=document.querySelector('.login-card .btn');
  if(btn){btn.disabled=true;btn.textContent='登录中...';}
  try{
    const r=await apiPost('/api/v1/common/auth/login',{用户名:u,密码:p});
    if(r.code===200&&r.data){
      localStorage.setItem('token',r.data.访问令牌);
      saveUser({用户名:r.data.用户名,真实姓名:r.data.真实姓名||r.data.用户名,角色:r.data.角色,用户ID:r.data.用户ID});
      showToast('登录成功','success');
      renderMain();
    }else{
      const msg=r.msg||'用户名或密码错误';
      if(errEl){errEl.textContent=msg;errEl.style.display='block'}else showToast('登录失败：'+msg,'error');
    }
  }catch(e){
    const msg='无法连接后端，请确认服务已启动';
    if(errEl){errEl.textContent=msg;errEl.style.display='block'}else showToast(msg,'error');
  }finally{
    if(btn){btn.disabled=false;btn.textContent='登 录';}
  }
};
window.doRegister=async function(){
  const u=document.getElementById('reg_user').value;
  const p=document.getElementById('reg_pass').value;
  const n=document.getElementById('reg_name').value;
  if(!u||!p){alert('请填写用户名和密码');return}
  const r=await apiPost('/api/v1/common/auth/register',{用户名:u,密码:p,真实姓名:n});
  if(r.code===200) {alert('注册成功，请登录');renderLogin();}
  else alert('注册失败：'+(r.msg||'未知错误'));
};

// ========== 主界面 ==========
function renderMain(){
  const u=getUser();
  if(!u||!u.角色){renderLogin();return}
  const config=ROLE_CONFIG[u.角色]||ROLE_CONFIG.guest;
  let sidebarHtml=`<div class="logo">AI-EAM<span class="badge">v2</span></div>
    <div class="user-info"><span>${u.真实姓名||u.用户名}</span><span class="role-tag" style="background:${config.color}33;color:${config.color}">${config.label}</span><span class="logout-btn" onclick="logout()">退出</span></div>`;
  sidebarHtml+=`<div class="nav-group"><div class="nav-group-title">概览</div><div class="nav-item active" data-page="home" onclick="navigateTo('home')"><span class="nav-icon">🏠</span><span>首页</span></div></div>`;
  config.pages.forEach(g=>{
    sidebarHtml+=`<div class="nav-group"><div class="nav-group-title">${g.group}</div>`;
    g.items.forEach(item=>{
      sidebarHtml+=`<div class="nav-item" data-page="${item.id}" onclick="navigateTo('${item.id}')"><span class="nav-icon">${item.icon}</span><span>${item.name}</span></div>`;
    });
    sidebarHtml+='</div>';
  });
  document.getElementById('app').innerHTML=`
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    <div id="sidebarMask" class="sidebar-mask" onclick="toggleSidebar(false)"></div>
    <div class="main-container">
      <nav class="sidebar">${sidebarHtml}</nav>
      <main class="content" id="mainContent"><div id="pageContent"></div></main>
    </div>`;
  navigateTo('home');
}
function navigateTo(pageId){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const navItem=document.querySelector(`.nav-item[data-page="${pageId}"]`);
  if(navItem)navItem.classList.add('active');
  toggleSidebar(false);
  const container=document.getElementById('pageContent');
  const main=document.getElementById('mainContent');
  if(main)main.scrollTop=0;
  if(!container)return;
  if(pageId==='home'){renderHome(container);return;}
  const renderFn=PAGE_RENDER[pageId];
  if(renderFn)renderFn(container);
  else container.innerHTML=`<div class="empty-state">页面"${pageId}"正在开发中...</div>`;
}
window.logout=function(){
  localStorage.removeItem('token');localStorage.removeItem('user');
  renderLogin();
};

// ========== 启动 ==========
async function bootstrap(){
  const token=getToken();
  if(!token){
    renderLogin();
    return;
  }
  try{
    const res=await fetch(API_BASE+'/api/v1/common/auth/me',{
      headers:{'Authorization':'Bearer '+token}
    });
    const data=await res.json();
    if(res.ok&&data.code===200&&data.data&&data.data.角色){
      saveUser({
        用户名:data.data.用户名,
        真实姓名:data.data.真实姓名||data.data.用户名,
        角色:data.data.角色,
        用户ID:data.data.用户ID
      });
      renderMain();
      return;
    }
  }catch(e){
    console.warn('Token validation failed:', e);
  }
  localStorage.removeItem('token');
  localStorage.removeItem('user');
  renderLogin();
}
bootstrap();
</script>
